name: release-image

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            judeufba/jude-sherlock:latest
            judeufba/jude-sherlock:${{ steps.vars.outputs.sha_short }}

  bump-deploy:
    runs-on: ubuntu-latest
    needs: [build-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
      - name: Bump JUDE_SHERLOCK_TAG in jude-deploy
        env:
          SHA: ${{ steps.vars.outputs.sha_short }}
        run: |
          git clone --branch release-prd \
            https://x-access-token:${{ secrets.DEPLOY_REPO_TOKEN }}@github.com/jude-ufba/jude-deploy.git deploy
          cd deploy
          sed -i "s/^JUDE_SHERLOCK_TAG=.*/JUDE_SHERLOCK_TAG=${SHA}/" .env
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git commit -am "ci(sherlock): bump JUDE_SHERLOCK_TAG to ${SHA}" || echo "Nada a commitar"
          git pull --rebase origin release-prd
          git push origin release-prd
